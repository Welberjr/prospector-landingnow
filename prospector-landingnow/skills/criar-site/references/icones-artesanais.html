<!DOCTYPE html>

<title>Ícones artesanais LandingNow (referência de estilo)</title>
<!--
REFERÊNCIA DE ESTILO: ícones "desenhados à mão" em SVG multicamadas, PARA QUALQUER NICHO.

ANATOMIA DO ÍCONE (a receita: siga isto para desenhar o ícone de QUALQUER serviço, de qualquer nicho):
1. SOMBRA: uma ellipse achatada na base (opacity .15 a .2, na cor escura do gradiente). Dá o "apoio no chão".
2. CORPO: o objeto principal do serviço, desenhado com formas simples e cantos arredondados,
   preenchido com linearGradient de 2 tons VIVOS (claro no topo-esquerda, escuro na base-direita).
   Traços com stroke-width 4 a 6 e stroke-linecap round.
3. BRILHO: um traço branco curto e curvo (opacity .6 a .8) no topo-esquerda do corpo. Dá o volume.
4. DETALHE DE PERSONALIDADE: 1 ou 2 elementos pequenos em cor de CONTRASTE fora da paleta do corpo
   (bolinha, estrela, faísca, folha, coração). É o que tira a cara de biblioteca.
5. FUNDO: quadradinho arredondado (border-radius ~24px) branco ou na cor clara da marca, com sombra suave.

COMO ESCOLHER O OBJETO POR NICHO (desenhe o SÍMBOLO DO SERVIÇO, não um ícone abstrato):
advogado = balança/martelo · dentista = dente com brilho · nutricionista = maçã/prato · academia = halter
salão/estética = tesoura/secador · oficina = chave inglesa/engrenagem · restaurante = panela/talheres
imobiliária = casa com chave · financeiro = moeda/gráfico subindo · pet = patinha · fotografia = câmera
consulta = estetoscópio · online = notebook com check · local = pin de mapa · contato = balão de conversa

PALETA: extraia 2 gradientes da marca do cliente + 2 cores de contraste fixas (dourado #ffd166 e um verde
ou azul vivo). Varie o gradiente entre os ícones da mesma página para ficar colorido como um conjunto.

NUNCA usar emoji, NUNCA usar ícone chapado/monocromático de biblioteca (o "padrão de IA").
Abaixo, 12 exemplos prontos em nichos diferentes: use como base e desenhe variações.
-->
